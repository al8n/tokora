name: CI

# The `Gate` jobs below encode the exact local gate discipline this branch developed:
# formatting, the targeted clippy passes, the full and valve-off test flavors, the
# release-profile suites (where debug-only nets vanish), the `cargo hack` per-feature
# clippy matrix, the no-std / bare-metal builds, the deny-warnings doc build, and a bench
# smoke check. Every job mirrors a command that is run by hand before pushing. The
# orthogonal `cross`, `miri-*` and `coverage` jobs are preserved from the prior workflow.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README"
      - "COPYRIGHT"
      - "LICENSE-*"
      - "**.md"
      - "**.txt"
  pull_request:
    paths-ignore:
      - "README"
      - "COPYRIGHT"
      - "LICENSE-*"
      - "**.md"
      - "**.txt"
  workflow_dispatch:
  schedule:
    - cron: "0 1 1 * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1
  nightly: nightly
  stable: stable

jobs:
  # ── Gate: formatting ────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup component add rustfmt
      - name: cargo +stable fmt --all -- --check
        run: cargo +stable fmt --all -- --check

  # ── Gate: clippy (tests + benches, no deps, deny warnings) ──────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-clippy-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
      - name: clippy --all-features --tests --no-deps -D warnings
        run: cargo +stable clippy --all-features --tests --no-deps -- -D warnings
      - name: clippy --all-features --benches --no-deps -D warnings
        run: cargo +stable clippy --all-features --benches --no-deps -- -D warnings

  # ── Gate: MSRV (the workspace `rust-version`; see the policy note in Cargo.toml) ─
  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-msrv-
      - name: Install Rust
        run: rustup toolchain install 1.87 --no-self-update --profile minimal
      - name: cargo +1.87 check -p tokit --all-features
        run: cargo +1.87 check -p tokit --all-features

  # ── Gate: full test suite ───────────────────────────────────────────────────
  test:
    name: test (all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: cargo test --all-features
        run: cargo test --all-features

  # ── Gate: valve-off flavor (logos + std, no other source/container valves) ──
  test-valve-off:
    name: test (valve-off)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-valveoff-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-valveoff-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: cargo test -p tokit --features logos,std
        run: cargo test -p tokit --features logos,std

  # ── Gate: release profile (the profile where debug_assertions-gated nets
  #    vanish). Filtered to `--lib` — the crate's own unit-test suites, where the
  #    guard / stacked / parse_state session / sync / recover / raw-checkpoint
  #    invariants live — plus the matching integration binaries. The remaining
  #    ~60 integration binaries are already exercised by the debug `test` job;
  #    compiling them in release too would not add coverage of a debug-only net. ─
  test-release:
    name: test (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-release-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: cargo test --release -p tokit --all-features --lib
        run: cargo test --release -p tokit --all-features --lib
      - name: cargo test --release (guard/sync/recover integration suites)
        run: cargo test --release -p tokit --all-features --test input_ref --test sync --test parser_recover --test state_machine --test tracker

  # ── Gate: the cargo-hack per-feature clippy matrix (its own job) ────────────
  hack-clippy:
    name: hack clippy (each-feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-hack-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-hack-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
      - name: Install cargo-hack
        run: cargo install cargo-hack
      - name: cargo +stable hack clippy -p tokit --each-feature --no-deps --tests -D warnings
        run: cargo +stable hack clippy -p tokit --each-feature --no-deps --tests -- -D warnings

  # ── Gate: no-std / bare-metal builds ────────────────────────────────────────
  no-std:
    name: no-std (thumbv6m)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-nostd-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nostd-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Add bare-metal target
        run: rustup target add thumbv6m-none-eabi
      - name: cargo build --no-default-features
        run: cargo build --no-default-features
      - name: cargo check --target thumbv6m-none-eabi --no-default-features
        run: cargo check --target thumbv6m-none-eabi --no-default-features
      - name: cargo check --target thumbv6m-none-eabi --no-default-features --features alloc
        run: cargo check --target thumbv6m-none-eabi --no-default-features --features alloc

  # ── Gate: docs build with deny-warnings ─────────────────────────────────────
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-doc-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

  # ── Gate: bench SMOKE only ──────────────────────────────────────────────────
  #
  # This compiles the benches and runs each once in test mode (`-- --test`); it is
  # NOT a timed regression gate. GitHub runners are far too noisy for the ±2%
  # regression discipline these benches are held to locally — a timing gate here
  # would flap. Regression numbers are gathered on dedicated hardware, off-CI.
  bench-smoke:
    name: bench (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bench-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: cargo bench --bench input_scan --features logos -- --test
        run: cargo bench --bench input_scan --features logos -- --test

  # ── Preserved: cross-compile smoke across extra platforms ───────────────────
  cross:
    name: cross
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - aarch64-unknown-linux-musl
          - i686-linux-android
          - x86_64-linux-android
          - i686-pc-windows-gnu
          - x86_64-pc-windows-gnu
          - i686-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - wasm32-unknown-unknown
          - wasm32-unknown-emscripten
          - wasm32-wasip1
          - wasm32-wasip1-threads
          - wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: cargo build --target ${{ matrix.target }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --target ${{ matrix.target }}

  # ── Preserved: Miri (Tree Borrows) ──────────────────────────────────────────
  miri-tb:
    name: miri-tb-${{ matrix.target }}-${{ matrix.cfg }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        cfg:
          - all_tests
        exclude:
          - os: ubuntu-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: i686-unknown-linux-gnu
          - os: macos-latest
            target: powerpc64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Install cargo-hack
        run: cargo install cargo-hack
      - name: Miri
        run: |
          bash ci/miri_tb.sh ${{ matrix.target }} ${{ matrix.cfg }}

  # ── Preserved: Miri (Stacked Borrows) ───────────────────────────────────────
  miri-sb:
    name: miri-sb-${{ matrix.target }}-${{ matrix.cfg }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
        cfg:
          - all_tests
        exclude:
          - os: ubuntu-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: i686-unknown-linux-gnu
          - os: macos-latest
            target: powerpc64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Install cargo-hack
        run: cargo install cargo-hack
      - name: Miri
        run: |
          bash ci/miri_sb.sh ${{ matrix.target }} ${{ matrix.cfg }}

  # ── Preserved: coverage (gated on the fast gates passing) ───────────────────
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - test
      - cross
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-
      - name: Run tarpaulin
        env:
          RUSTFLAGS: "--cfg tarpaulin"
        run: cargo tarpaulin --all-features --run-types tests --run-types doctests --run-types lib --run-types examples --workspace --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: true
